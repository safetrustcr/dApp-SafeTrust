actions:
  - name: sendVerificationCode
    definition:
      kind: synchronous
      handler: '{{WEBHOOK_URL}}/send-verification'
      forward_client_headers: true
    permissions:
      - role: anonymous
  - name: verifyEmailCode
    definition:
      kind: synchronous
      handler: '{{WEBHOOK_URL}}/verify-code'
      forward_client_headers: true
    permissions:
      - role: anonymous
  - name: prepare_escrow_contract
    definition:
      kind: synchronous
      handler: '{{WEBHOOK_URL}}/prepare-escrow-contract'
      forward_client_headers: true
    permissions:
      - role: user
        permission:
          allow: true
  - name: open_dispute
    definition:
      kind: synchronous
      handler: '{{WEBHOOK_URL}}/api/escrow/dispute'
      headers:
        - name: x-webhook-secret
          value_from_env: WEBHOOK_ADMIN_SECRET
      forward_client_headers: true
    permissions:
      - role: user
        permission:
          allow: true

custom_types:
  enums: []
  input_objects:
    - name: SendVerificationInput
    - name: VerifyCodeInput
    - name: EscrowMilestoneInput
    - name: EscrowRoleInput
    - name: OpenDisputeInput
    - name: PrepareEscrowContractInput
    - name: TrustlineInput
  objects:
    - name: VerificationResponse
    - name: OpenDisputeOutput
    - name: PrepareEscrowContractOutput
  scalars: []