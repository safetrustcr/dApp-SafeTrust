table:
  name: apartments
  schema: public
object_relationships:
  - name: owner
    using:
      foreign_key_constraint_on: owner_id
select_permissions:
  - role: tenant
    permission:
      columns:
        - id
        - owner_id
        - name
        - description
        - price
        - warranty_deposit
        - coordinates
        - address
        - is_available
        - available_from
        - available_until
        - image_urls
        - created_at
        - updated_at
      filter:
        _and:
          - deleted_at:
              _is_null: true
          - is_available:
              _eq: true
  - role: landlord
    permission:
      columns:
        - id
        - owner_id
        - name
        - description
        - price
        - warranty_deposit
        - coordinates
        - address
        - is_available
        - available_from
        - available_until
        - image_urls
        - created_at
        - updated_at
        - deleted_at
      filter:
        owner_id:
          _eq: X-Hasura-User-Id
