table:
  name: apartments
  schema: public
object_relationships:
  - name: owner
    using:
      foreign_key_constraint_on: owner_id
select_permissions:
  - role: tenant
    permission:
      # Tenants can browse all active, non-deleted listings.
      # deleted_at is excluded from the column list — tenants never see deleted records.
      columns:
        - id
        - owner_id
        - name
        - description
        - price
        - warranty_deposit
        - coordinates
        - location_area
        - address
        - is_available
        - available_from
        - available_until
        - image_urls
        - created_at
        - updated_at
      filter:
        _and:
          - is_available:
              _eq: true
          - deleted_at:
              _is_null: true
  - role: landlord
    permission:
      # Landlords see only their own apartments (all statuses, including soft-deleted,
      # so they retain a history of removed listings).
      columns:
        - id
        - owner_id
        - name
        - description
        - price
        - warranty_deposit
        - coordinates
        - location_area
        - address
        - is_available
        - available_from
        - available_until
        - image_urls
        - created_at
        - updated_at
        - deleted_at
      filter:
        owner_id:
          _eq: X-Hasura-User-Id
